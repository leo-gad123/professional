<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Hakizimana Leogad" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Hakizimana Leogad",
        "jobTitle": "Embedded Systems & IoT Engineer",
        "url": "https://prof.hakizimanaleogad.workers.dev/",
        "address": "Kigali, Rwanda",
        "knowsAbout": ["Embedded Systems", "IoT", "Arduino", "Electronics", "Automation"]
      }
    </script>
    <title>Hakizimana Leogad — Embedded Systems & IoT Engineer</title>
    <style>
      .loading-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        z-index: 9999;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .loading-logo {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid rgba(52, 211, 153, 0.3);
        overflow: hidden;
        margin-bottom: 24px;
      }
      .loading-logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .loading-name {
        font-size: 18px;
        font-weight: 600;
        color: #e5e7eb;
        margin-bottom: 32px;
      }
      .loading-sub {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 32px;
        margin-top: -20px;
      }
      .loading-dots {
        display: flex;
        gap: 8px;
      }
      .loading-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #34d399;
        animation: ld-pulse 1.4s ease-in-out infinite;
      }
      .loading-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .loading-dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes ld-pulse {
        0%,
        80%,
        100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-splash">
        <div class="loading-logo"><img src="/portrait.png" alt="LG" /></div>
        <div class="loading-name">Hakizimana Leogad</div>
        <div class="loading-sub">Embedded Systems & IoT Engineer</div>
        <div class="loading-dots">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
